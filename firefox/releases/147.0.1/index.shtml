<article id="whatsnew" class="module">

  <h2>Firefox 新鮮事</h2>
  <ul class="tags">
    <li>
      <span class="tag tag-fixed">修正</span>
      <p>暫時停用新版 Compression Dictionaries 技術，修正 ChatGPT 等網站的相容性問題。（<a target="_blank" href="https://bugzilla.mozilla.org/show_bug.cgi?id=2010712">Bug 2010712</a>）</p>
    </li>

    <li>
      <span class="tag tag-fixed">修正</span>
      <p>修正 Linux 系統會多建立一個不必要空目錄的問題。（<a target="_blank" href="https://bugzilla.mozilla.org/show_bug.cgi?id=2001887">Bug 2001887</a>）</p>
    </li>

    <li>
      <span class="tag tag-fixed">修正</span>
      <p>修正時間格式處理造成部分網站顯示異常的問題。（<a target="_blank" href="https://bugzilla.mozilla.org/show_bug.cgi?id=2010411">Bug 2010411</a>）</p>
    </li>

    <li>
      <span class="tag tag-fixed">修正</span>
      <p>若需瞭解此版本之前的變更，請參考 <a href="/firefox/releases/147.0/">Firefox 147.0 版本資訊</a>。</p>

  </ul>
